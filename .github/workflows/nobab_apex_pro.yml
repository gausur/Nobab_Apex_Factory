name: Nobab Apex Complete
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  apex_engine:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    permissions:
      issues: write
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tor exiftool
          pip3 install requests beautifulsoup4 pillow pycryptodome stem

      - name: Restore checkpoint
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: apex-checkpoint
          path: .checkpoint

      - name: Load state
        run: |
          if [ -f .checkpoint/state.tar.gz ]; then
            tar -xzf .checkpoint/state.tar.gz -C .
          fi

      - name: Run Full Swarm
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}   # ব্যবহার করবে GH_TOKEN
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 << 'PYEOF'
          import json, time, subprocess, requests, os, random, hashlib, glob, shutil, re, base64
          from concurrent.futures import ThreadPoolExecutor
          from stem import Signal
          from stem.control import Controller
          from Crypto.Cipher import AES
          from PIL import Image
          from PIL.ExifTags import TAGS

          # ---------- DEFAULT MISSION ----------
          DEFAULT_MISSION = {
              "MISSION": "BUILD_18_LAYERS",
              "RULES": "NO_HF, TOR_CHAIN, OBFUSCATE, DARK_WEB",
              "WORK_CYCLE": "5h_work,1h_sleep",
              "LAYERS": {
                  "1": "data_engine","2": "rag","3": "agentic_soc","4": "active_defense",
                  "5": "retaliatory","6": "binary_harden","7": "kernel","8": "hyperv",
                  "9": "firmware","10": "microarch","11": "supply_chain","12": "quantum",
                  "13": "ai_defense","14": "human_centric","15": "counter_strike",
                  "16": "hyper_attribution","17": "global_data","18": "autonomous"
              },
              "REQUIRE_API_KEYS": ["GROQ", "OPENROUTER", "KAGGLE"]
          }

          # ---------- STATE ----------
          if os.path.exists("state.json"):
              with open("state.json") as f:
                  state = json.load(f)
          else:
              state = {"layers": {str(i): "pending" for i in range(1,19)},
                       "last_checkpoint": time.time(),
                       "resources": {}}

          # ---------- SEED IMAGE (optional) ----------
          try:
              img = Image.open("nobab_vision.png")
              exif = img._getexif()
              if exif:
                  for tag, val in exif.items():
                      if TAGS.get(tag) == "XPComment":
                          encrypted = val
                          break
                  else:
                      raise Exception("No XPComment")
                  repo = os.environ['GITHUB_REPOSITORY'].split('/')[-1]
                  key = f"nobab2026+{repo}".encode()[:32]
                  enc = base64.b64decode(encrypted)
                  cipher = AES.new(key, AES.MODE_GCM, nonce=enc[:16])
                  plain = cipher.decrypt_and_verify(enc[16:-16], enc[-16:]).decode()
                  mission = json.loads(plain)
              else:
                  mission = DEFAULT_MISSION
          except Exception as e:
              print(f"⚠️ Seed error: {e}. Using default mission.")
              mission = DEFAULT_MISSION

          # ---------- TOR + PROXY ----------
          def renew_tor():
              try:
                  with Controller.from_port(port=9051) as ctrl:
                      ctrl.authenticate()
                      ctrl.signal(Signal.NEWNYM)
                      time.sleep(3)
              except: pass

          PROXY_URL = "https://api.proxyscrape.com/v2/?request=displayproxies&protocol=http&timeout=10000&country=all&ssl=all&anonymity=all"
          def get_proxies():
              renew_tor()
              proxies = {"http": "socks5://127.0.0.1:9050", "https": "socks5://127.0.0.1:9050"}
              try:
                  resp = requests.get(PROXY_URL, timeout=10)
                  if resp.status_code == 200:
                      lines = resp.text.splitlines()
                      if lines:
                          p = random.choice(lines).strip()
                          proxies["http"] = f"http://{p}"
                          proxies["https"] = f"http://{p}"
              except: pass
              return proxies

          # ---------- DARK WEB CRAWL ----------
          def darkweb_crawl():
              proxies = get_proxies()
              discovered = []
              known = ["torwikii.onion", "darkfail.onion", "ahmia.fi"]
              for dom in known:
                  try:
                      r = requests.get(f"http://{dom}", proxies=proxies, timeout=20)
                      if r.status_code == 200:
                          discovered.append(dom)
                  except: pass
              for _ in range(30):
                  rand = ''.join(random.choices('abcdefghijklmnopqrstuvwxyz234567', k=16))
                  test = f"{rand}.onion"
                  try:
                      r = requests.get(f"http://{test}", proxies=proxies, timeout=10)
                      if r.status_code == 200:
                          discovered.append(test)
                  except: pass
              return discovered

          # ---------- MULTI-MODEL ----------
          def multi_model(prompt):
              results = []
              groq_key = os.environ.get("GROQ_API_KEY")
              if groq_key:
                  try:
                      resp = requests.post("https://api.groq.com/openai/v1/chat/completions",
                          headers={"Authorization": f"Bearer {groq_key}"},
                          json={"model": "llama3-70b-8192", "messages": [{"role": "user", "content": prompt}]},
                          timeout=25)
                      if resp.status_code == 200:
                          results.append(resp.json()["choices"][0]["message"]["content"])
                  except: pass
              or_key = os.environ.get("OPENROUTER_API_KEY")
              if or_key:
                  try:
                      resp = requests.post("https://openrouter.ai/api/v1/chat/completions",
                          headers={"Authorization": f"Bearer {or_key}"},
                          json={"model": "deepseek/deepseek-r1", "messages": [{"role": "user", "content": prompt}]},
                          timeout=25)
                      if resp.status_code == 200:
                          results.append(resp.json()["choices"][0]["message"]["content"])
                  except: pass
              try:
                  resp = requests.post("http://localhost:11434/api/generate", json={"model": "codellama", "prompt": prompt}, timeout=60)
                  if resp.status_code == 200:
                      results.append(resp.json()["response"])
              except: pass
              if not results: return ""
              return results[0] if len(results)==1 else (results[0] if results[0]==results[1] else results[0])

          # ---------- OBFUSCATION ----------
          def obfuscate(code):
              for i in range(10):
                  code = code.replace(f"x{i}", ''.join(random.choices('abcdef',k=6)))
              code = re.sub(r'(def\s+)(\w+)(\()', lambda m: m.group(1)+m.group(2)+'_'+str(random.randint(100,999))+m.group(3), code)
              lines = code.split('\n')
              return '\n'.join([l+' \u200b' for l in lines]) + f"\n# {hashlib.md5(str(time.time()).encode()).hexdigest()}\n"

          # ---------- ISSUE (using GH_TOKEN) ----------
          def create_issue(title, body):
              token = os.environ.get("GITHUB_TOKEN")
              if not token:
                  print("⚠️ No GH_TOKEN found, skipping issue creation.")
                  return
              repo = os.environ['GITHUB_REPOSITORY']
              url = f"https://api.github.com/repos/{repo}/issues"
              headers = {"Authorization": f"token {token}", "Accept": "application/vnd.github.v3+json"}
              try:
                  requests.post(url, json={"title": title, "body": body}, headers=headers, timeout=10)
                  print(f"Issue created: {title}")
              except Exception as e:
                  print(f"Issue failed: {e}")

          # ---------- SCOUT ----------
          def scout():
              proxies = get_proxies()
              dark = darkweb_crawl()
              state["darkweb_seeds"] = dark
              if not os.environ.get("GROQ_API_KEY"):
                  create_issue("GPU: Groq API key missing", "Add GROQ_API_KEY secret.")
              if not os.environ.get("OPENROUTER_API_KEY"):
                  create_issue("GPU: OpenRouter API key missing", "Add OPENROUTER_API_KEY.")
              if not (os.environ.get("KAGGLE_USERNAME") and os.environ.get("KAGGLE_KEY")):
                  create_issue("GPU: Kaggle credentials missing", "Add KAGGLE_USERNAME and KAGGLE_KEY.")
              return dark

          # ---------- ARCHITECT ----------
          def architect():
              pending = [l for l,st in state["layers"].items() if st in ["pending","partial"]]
              if not pending: return "all_done"
              l = pending[0]
              name = mission["LAYERS"].get(l, f"layer_{l}")
              prompt = f"Design cyber defense layer {name}. Return JSON: {{'modules': [...], 'algorithm': '...'}}"
              logic = multi_model(prompt)
              if not logic: logic = '{"modules":["monitor","block"],"algorithm":"heuristic"}'
              state["arch_design"] = {"layer": l, "logic": logic}
              state["layers"][l] = "designing"
              return logic

          # ---------- BUILDER ----------
          def builder():
              d = state.get("arch_design")
              if not d: return
              l = d["layer"]
              prompt = f"Write Python code for layer {l} with logic: {d['logic']}"
              code = multi_model(prompt)
              if not code: code = "def start(): print('ok')"
              code = obfuscate(code)
              os.makedirs(f"layers/layer_{l}", exist_ok=True)
              with open(f"layers/layer_{l}/core.py","w") as f: f.write(code)
              try:
                  subprocess.run(["python3","-m","py_compile", f"layers/layer_{l}/core.py"], check=True, timeout=30)
                  state["layers"][l] = "done"
                  subprocess.run(["git","config","user.email","bot@nobab.apex"])
                  subprocess.run(["git","config","user.name","Nobab Bot"])
                  subprocess.run(["git","add","."])
                  subprocess.run(["git","commit","-m","auto layer update","--author='Nobab Bot <bot@nobab.apex>'"])
                  subprocess.run(["git","push"])
              except:
                  state["layers"][l] = "partial"

          # ---------- NANO KERNEL & CHECKPOINT ----------
          def nano_kernel():
              for lay, stat in state["layers"].items():
                  if stat == "partial":
                      cnt = state.get("failcnt",{}).get(lay,0)+1
                      state["failcnt"][lay]=cnt
                      if cnt>=3:
                          shutil.rmtree(f"layers/layer_{lay}", ignore_errors=True)
                          state["layers"][lay]="pending"
                          del state["failcnt"][lay]
              return True

          def save_checkpoint():
              with open("state.json","w") as f: json.dump(state,f)
              subprocess.run(["tar","-czf","state.tar.gz","state.json","layers/"])
              os.makedirs(".checkpoint",exist_ok=True)
              shutil.move("state.tar.gz",".checkpoint/")

          # ---------- MAIN ----------
          with ThreadPoolExecutor(max_workers=3) as ex:
              sc = ex.submit(scout)
              ar = ex.submit(architect)
              sc.result()
              res = ar.result()
              if res != "all_done":
                  builder()
              nano_kernel()
              save_checkpoint()
          PYEOF

      - name: Upload checkpoint
        uses: actions/upload-artifact@v4
        with:
          name: apex-checkpoint
          path: .checkpoint/state.tar.gz
          retention-days: 1

      - name: Dashboard commit
        run: |
          echo "<html><body><h1>Nobab Apex Active</h1><p>Last updated: $(date)</p></body></html>" > index.html
          git add index.html || true
          git commit -m "dashboard update" --author="Nobab Bot <bot@nobab.apex>" || true
          git push || true
