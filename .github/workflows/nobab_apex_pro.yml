name: Nobab Apex Pro
on:
  schedule:
    - cron: '0 */6 * * *'   # প্রতি 6 ঘণ্টা = 5h কাজ + 1h বিরতি
  workflow_dispatch:

env:
  SEED_IMAGE: nobab_vision.png
  CHECKPOINT_ARTIFACT: apex-checkpoint
  PROXY_LIST_URL: "https://api.proxyscrape.com/v2/?request=displayproxies&protocol=http&timeout=10000&country=all&ssl=all&anonymity=all"

jobs:
  apex_engine:
    runs-on: ubuntu-latest
    timeout-minutes: 300   # 5 hours max
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tor exiftool
          pip3 install requests beautifulsoup4 pillow pycryptodome stem
          sudo systemctl start tor
          
      - name: Restore previous checkpoint (Phoenix)
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: ${{ env.CHECKPOINT_ARTIFACT }}
          path: .checkpoint
          
      - name: Load state if exists
        run: |
          if [ -f .checkpoint/state.tar.gz ]; then
            tar -xzf .checkpoint/state.tar.gz -C .
          fi
          
      - name: Main Swarm Execution (Scout, Architect, Builder)
        run: |
          python3 << 'PYEOF'
          import json, time, subprocess, requests, os, random, hashlib, glob, shutil, re, threading
          from concurrent.futures import ThreadPoolExecutor
          from stem import Signal
          from stem.control import Controller
          
          # ---------- 0. লোড স্টেট ও সীড ----------
          if os.path.exists("state.json"):
              with open("state.json") as f:
                  state = json.load(f)
          else:
              state = {"layers": {str(i): "pending" for i in range(1,19)},
                       "last_checkpoint": time.time(),
                       "resources": {}}
                      
          # Load mission from seed image
          from PIL import Image
          from PIL.ExifTags import TAGS
          from Crypto.Cipher import AES
          import base64
          
          def decrypt_aes(encrypted_b64, key):
              encrypted = base64.b64decode(encrypted_b64)
              cipher = AES.new(key.encode(), AES.MODE_GCM, nonce=encrypted[:16])
              return cipher.decrypt_and_verify(encrypted[16:-16], encrypted[-16:]).decode()
          
          img = Image.open("nobab_vision.png")
          exif = img._getexif()
          encrypted_seed = None
          for tag, value in exif.items():
              if TAGS.get(tag) == "XPComment":
                  encrypted_seed = value
                  break
          repo = os.environ['GITHUB_REPOSITORY'].split('/')[-1]
          seed_key = f"nobab2026+{repo}"
          mission_plain = decrypt_aes(encrypted_seed, seed_key)
          mission = json.loads(mission_plain)
          
          # ---------- 1. প্রোক্সি চেইনিং ও টর ----------
          def renew_tor_ip():
              try:
                  with Controller.from_port(port=9051) as controller:
                      controller.authenticate()
                      controller.signal(Signal.NEWNYM)
                      time.sleep(5)
              except:
                  pass
          
          def get_proxies():
              renew_tor_ip()
              proxies = {"http": "socks5://127.0.0.1:9050", "https": "socks5://127.0.0.1:9050"}
              try:
                  resp = requests.get(os.environ['PROXY_LIST_URL'], timeout=10)
                  if resp.status_code == 200:
                      lines = resp.text.splitlines()
                      if lines:
                          p = random.choice(lines).strip()
                          proxies["http"] = f"http://{p}"
                          proxies["https"] = f"http://{p}"
              except:
                  pass
              return proxies
          
          # ---------- 2. মাল্টি-মডেল কনসেনসাস ----------
          def multi_model_consensus(prompt):
              results = []
              # Groq
              groq_key = os.environ.get("GROQ_API_KEY")
              if groq_key:
                  try:
                      resp = requests.post("https://api.groq.com/openai/v1/chat/completions",
                          headers={"Authorization": f"Bearer {groq_key}"},
                          json={"model": "llama3-70b-8192", "messages": [{"role": "user", "content": prompt}]},
                          timeout=30)
                      if resp.status_code == 200:
                          results.append(resp.json()["choices"][0]["message"]["content"])
                  except: pass
              # OpenRouter
              or_key = os.environ.get("OPENROUTER_API_KEY")
              if or_key:
                  try:
                      resp = requests.post("https://openrouter.ai/api/v1/chat/completions",
                          headers={"Authorization": f"Bearer {or_key}"},
                          json={"model": "deepseek/deepseek-r1", "messages": [{"role": "user", "content": prompt}]},
                          timeout=30)
                      if resp.status_code == 200:
                          results.append(resp.json()["choices"][0]["message"]["content"])
                  except: pass
              # Local Ollama (fallback)
              try:
                  resp = requests.post("http://localhost:11434/api/generate", json={"model": "codellama", "prompt": prompt}, timeout=60)
                  if resp.status_code == 200:
                      results.append(resp.json()["response"])
              except: pass
              
              if not results:
                  return ""
              # Majority vote (first two equal)
              if len(results) >= 2 and results[0] == results[1]:
                  return results[0]
              return results[0]
          
          # ---------- 3. পলিমরফিক অবফাসকেশন ----------
          def obfuscate_code(code):
              # variable names
              for i in range(10):
                  fake = ''.join(random.choices('abcdefghijklmnopqrstuvwxyz', k=8))
                  code = code.replace(f"var_{i}", fake)
              # function names
              def repl_func(m):
                  return m.group(1) + m.group(2) + '_' + str(random.randint(100,999)) + m.group(3)
              code = re.sub(r'(def\s+)(\w+)(\()', repl_func, code)
              # inject zero-width spaces and random comments
              lines = code.split('\n')
              code = '\n'.join([line + '  \u200b' for line in lines])
              code += f"\n# {hashlib.md5(str(time.time()).encode()).hexdigest()}\n"
              return code
          
          # ---------- 4. স্কাউট এজেন্ট ----------
          def scout_agent():
              proxies = get_proxies()
              sources = []
              # Hugging Face is banned – search GitHub and known free GPU providers
              try:
                  resp = requests.get("https://api.github.com/search/repositories?q=free+gpu+api+key+2026&per_page=5",
                                      headers={"Accept": "application/vnd.github.v3+json"},
                                      proxies=proxies, timeout=15)
                  if resp.status_code == 200:
                      for item in resp.json().get("items", []):
                          sources.append(("GitHub", item["html_url"]))
              except: pass
              # Check if we need to ask for keys
              if not os.environ.get("GROQ_API_KEY"):
                  create_issue("⚠️ Groq API Key Required", "Please add GROQ_API_KEY secret for faster inference.")
              if not os.environ.get("OPENROUTER_API_KEY"):
                  create_issue("⚠️ OpenRouter API Key Required", "Please add OPENROUTER_API_KEY for multi-model consensus.")
              if not (os.environ.get("KAGGLE_USERNAME") and os.environ.get("KAGGLE_KEY")):
                  create_issue("⚠️ Kaggle Credentials Required", "Add KAGGLE_USERNAME and KAGGLE_KEY for free GPU hours.")
              
              state["resources"]["last_scout"] = time.time()
              state["resources"]["discovered"] = sources
              return sources
          
          def create_issue(title, body):
              repo = os.environ['GITHUB_REPOSITORY']
              url = f"https://api.github.com/repos/{repo}/issues"
              headers = {"Authorization": f"token {os.environ['GITHUB_TOKEN']}",
                         "Accept": "application/vnd.github.v3+json"}
              data = {"title": title, "body": body}
              try:
                  requests.post(url, json=data, headers=headers)
              except:
                  pass
          
          # ---------- 5. আর্কিটেক্ট এজেন্ট ----------
          def architect_agent():
              pending = [l for l, st in state["layers"].items() if st in ["pending","partial"]]
              if not pending:
                  return "all_done"
              next_layer = pending[0]
              layer_name = mission.get("LAYERS", {}).get(next_layer, f"layer_{next_layer}")
              prompt = f"Design the logic for a cybersecurity defense layer named {layer_name}. Output JSON with modules and algorithms."
              best_logic = multi_model_consensus(prompt)
              if not best_logic:
                  best_logic = '{"modules": ["monitor", "respond"], "algorithm": "heuristic"}'
              state["architect_design"] = {"layer": next_layer, "logic": best_logic}
              state["layers"][next_layer] = "designing"
              return best_logic
          
          # ---------- 6. বিল্ডার এজেন্ট ----------
          def builder_agent():
              design = state.get("architect_design")
              if not design:
                  return "no_design"
              layer = design["layer"]
              prompt = f"Write Python code for layer {layer} with logic: {design['logic']}. Use standard libraries only."
              raw_code = multi_model_consensus(prompt)
              if not raw_code:
                  raw_code = "def start(): print('placeholder')"
              obfuscated = obfuscate_code(raw_code)
              # Save
              os.makedirs(f"layers/layer_{layer}", exist_ok=True)
              with open(f"layers/layer_{layer}/core.py", "w") as f:
                  f.write(obfuscated)
              # Sandbox test (syntax check only)
              try:
                  subprocess.run(["python3", "-m", "py_compile", f"layers/layer_{layer}/core.py"], check=True, timeout=30)
                  state["layers"][layer] = "done"
                  # Git commit
                  subprocess.run(["git", "config", "user.email", "bot@nobab.apex"])
                  subprocess.run(["git", "config", "user.name", "Nobab Apex Bot"])
                  subprocess.run(["git", "add", "."])
                  subprocess.run(["git", "commit", "-m", "chore: auto update layer", "--author='Nobab Bot <bot@nobab.apex>'"])
                  subprocess.run(["git", "push"])
              except:
                  state["layers"][layer] = "partial"
              return "built"
          
          # ---------- 7. ন্যানো-কার্নেল ----------
          def nano_kernel():
              for lay, stat in state["layers"].items():
                  if stat == "partial":
                      fails = state.get("failure_count", {}).get(lay, 0) + 1
                      state["failure_count"][lay] = fails
                      if fails >= 3:
                          shutil.rmtree(f"layers/layer_{lay}", ignore_errors=True)
                          state["layers"][lay] = "pending"
                          del state["failure_count"][lay]
                          print(f"Layer {lay} pruned and reset.")
              return True
          
          # ---------- 8. ফিনিক্স চেকপয়েন্ট ----------
          def save_checkpoint():
              with open("state.json", "w") as f:
                  json.dump(state, f)
              subprocess.run(["tar", "-czf", "state.tar.gz", "state.json", "layers/"])
              os.makedirs(".checkpoint", exist_ok=True)
              shutil.move("state.tar.gz", ".checkpoint/")
          
          # ---------- মেইন প্যারালাল এক্সিকিউশন ----------
          with ThreadPoolExecutor(max_workers=3) as ex:
              scout_f = ex.submit(scout_agent)
              arch_f = ex.submit(architect_agent)
              scout_f.result()
              arch_result = arch_f.result()
              if arch_result != "all_done":
                  builder_agent()
              nano_kernel()
              save_checkpoint()
          PYEOF
          
      - name: Upload checkpoint artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.CHECKPOINT_ARTIFACT }}
          path: .checkpoint/state.tar.gz
          retention-days: 1
          
      - name: Final small commit (dashboard)
        run: |
          echo "<html><body><h1>Nobab Apex Pro Active</h1><p>Last updated: $(date)</p></body></html>" > index.html
          git add index.html || true
          git commit -m "chore: update dashboard" --author="Nobab Bot <bot@nobab.apex>" || true
          git push || true
