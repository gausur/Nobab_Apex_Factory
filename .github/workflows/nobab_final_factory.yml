      - name: Install dependencies
        run: |
name: Nobab Final Factory
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip git
          pip3 install requests
      - name: Restore checkpoint
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: factory-checkpoint
          path: .checkpoint
      - name: Load state
        run: |
          if [ -f .checkpoint/state.tar.gz ]; then
            tar -xzf .checkpoint/state.tar.gz -C .
          fi
      - name: Run factory
        run: |
          cat > factory.py << 'EOF'
import json, os, subprocess, requests, time, shutil, glob
state_file = "state.json"
if os.path.exists(state_file):
    with open(state_file) as f: state = json.load(f)
else:
    state = {"layers": {str(i): "pending" for i in range(1,19)}, "fail": {}, "resources": []}
layer_names = {
    "1":"data_engine","2":"rag","3":"agentic_soc","4":"active_defense",
    "5":"retaliatory","6":"binary_harden","7":"kernel","8":"hyperv",
    "9":"firmware","10":"microarch","11":"supply_chain","12":"quantum",
    "13":"ai_defense","14":"human_centric","15":"counter_strike",
    "16":"hyper_attribution","17":"global_data","18":"autonomous"
}
def scout():
    resources = []
    try:
        r = requests.get("https://api.github.com/search/repositories?q=cybersecurity+defense", timeout=10)
        if r.status_code == 200:
            items = r.json().get("items", [])
            resources = [(item["name"], item["html_url"]) for item in items[:5]]
    except: pass
    state["resources"] = resources
    with open("scout_report.txt", "w") as f:
        for name, url in resources:
            f.write(f"{name}: {url}\n")
def fetch_from_github(layer_num, layer_name):
    query = f"{layer_name} python defense"
    try:
        r = requests.get(f"https://api.github.com/search/repositories?q={query}&per_page=2", timeout=10)
        if r.status_code == 200:
            items = r.json().get("items", [])
            for item in items:
                clone_url = item["clone_url"]
                target = f"tmp_{layer_num}"
                shutil.rmtree(target, ignore_errors=True)
                subprocess.run(["git", "clone", "--depth", "1", clone_url, target], capture_output=True)
                shutil.rmtree(os.path.join(target, ".git"), ignore_errors=True)
                py_files = glob.glob(f"{target}/*.py")
                if py_files:
                    src = py_files[0]
                    dst = f"layers/layer_{layer_num}/core.py"
                    os.makedirs(os.path.dirname(dst), exist_ok=True)
                    shutil.copy(src, dst)
                    shutil.rmtree(target, ignore_errors=True)
                    ret = subprocess.run(["python3", "-m", "py_compile", dst], capture_output=True)
                    if ret.returncode == 0: return True
                    else: os.remove(dst)
    except: pass
    return False
def write_default(layer_num, layer_name):
    code = f'# Layer {layer_num}: {layer_name}\nimport time\nclass Defense:\n    def start(self):\n        print(f"[+] Layer {layer_num} started")\n        time.sleep(1)\n        return True\n'
    os.makedirs(f"layers/layer_{layer_num}", exist_ok=True)
    with open(f"layers/layer_{layer_num}/core.py", "w") as f: f.write(code)
    ret = subprocess.run(["python3", "-m", "py_compile", f"layers/layer_{layer_num}/core.py"], capture_output=True)
    return ret.returncode == 0
def build_layer(layer_num):
    layer = str(layer_num)
    name = layer_names.get(layer, f"layer_{layer_num}")
    code_path = f"layers/layer_{layer}/core.py"
    status = state["layers"].get(layer, "pending")
    if status in ["pending", "partial"] or not os.path.exists(code_path):
        success = fetch_from_github(layer_num, name)
        if not success: success = write_default(layer_num, name)
        if success:
            state["layers"][layer] = "done"
            subprocess.run(["git", "config", "user.email", "bot@nobab.apex"])
            subprocess.run(["git", "config", "user.name", "Nobab Bot"])
            lock = ".git/index.lock"
            if os.path.exists(lock): os.remove(lock)
            subprocess.run(["git", "add", f"layers/layer_{layer}"])
            subprocess.run(["git", "commit", "-m", f"auto: layer {layer} done", "--author='Nobab Bot <bot@nobab.apex>'"])
            subprocess.run(["git", "push"])
            time.sleep(2)
        else:
            state["layers"][layer] = "partial"
            cnt = state["fail"].get(layer, 0) + 1
            state["fail"][layer] = cnt
            if cnt >= 3:
                shutil.rmtree(f"layers/layer_{layer}", ignore_errors=True)
                state["layers"][layer] = "pending"
                if layer in state["fail"]: del state["fail"][layer]
    return state["layers"][layer]
def monitor():
    lines = ["# Nobab Factory Status\n"]
    for i in range(1,19):
        st = state["layers"].get(str(i), "unknown")
        icon = "✅" if st == "done" else "⏳" if st == "pending" else "❌" if st == "failed" else "⚠️"
        lines.append(f"{icon} Layer {i}: {layer_names.get(str(i),'')} → {st}")
    lines.append(f"\n🕒 Last update: {time.ctime()}")
    with open("STATUS.md", "w") as f: f.write("\n".join(lines))
    with open(state_file, "w") as f: json.dump(state, f)
    subprocess.run(["tar", "-czf", "state.tar.gz", state_file, "layers/"], capture_output=True)
    os.makedirs(".checkpoint", exist_ok=True)
    shutil.move("state.tar.gz", ".checkpoint/")
    lock = ".git/index.lock"
    if os.path.exists(lock): os.remove(lock)
    subprocess.run(["git", "add", "STATUS.md", "scout_report.txt"], capture_output=True)
    subprocess.run(["git", "commit", "-m", "update status", "--author='Nobab Bot <bot@nobab.apex>'"], capture_output=True)
    subprocess.run(["git", "push"], capture_output=True)
    time.sleep(1)
scout()
for i in range(1,19): build_layer(i)
monitor()
EOF
          python3 factory.py
      - name: Upload checkpoint
        uses: actions/upload-artifact@v4
        with:
          name: factory-checkpoint
          path: .checkpoint/state.tar.gz
          retention-days: 1
