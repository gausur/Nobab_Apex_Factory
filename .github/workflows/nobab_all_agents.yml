name: Nobab All Agents (with GH_TOKEN)
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  factory_with_agents:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Configure git with GH_TOKEN
        run: |
          git config --global url."https://${{ secrets.GH_TOKEN }}@github.com/".insteadOf "https://github.com/"
          git config --global user.email "bot@nobab.apex"
          git config --global user.name "Nobab Bot"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tor git curl wget
          pip3 install requests beautifulsoup4 pillow pycryptodome stem

      - name: Clone all external agents (no submodules, just folders)
        run: |
          mkdir -p agents
          cd agents
          git clone --depth 1 https://github.com/Significant-Gravitas/AutoGPT.git || true
          git clone --depth 1 https://github.com/joaomdmoura/crewAI.git || true
          git clone --depth 1 https://github.com/HermesAgent/Hermes.git || true
          git clone --depth 1 https://github.com/seed-ai/seed.git || true
          git clone --depth 1 https://github.com/EvoAgentX/EvoAgentX.git || true
          git clone --depth 1 https://github.com/sidix/sidix.git || true
          cd ..
          # Add agents/ to .gitignore so they are not committed
          echo "agents/" >> .gitignore

      - name: Restore checkpoint (Phoenix)
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: all-agents-checkpoint
          path: .checkpoint

      - name: Load state
        run: |
          if [ -f .checkpoint/state.tar.gz ]; then
            tar -xzf .checkpoint/state.tar.gz -C .
          fi

      - name: Run Master Orchestrator with all agents
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import json, os, subprocess, time, random, requests, shutil, glob
          from concurrent.futures import ThreadPoolExecutor

          # ---------- STATE ----------
          STATE_FILE = 'state.json'
          if os.path.exists(STATE_FILE):
              with open(STATE_FILE) as f:
                  state = json.load(f)
          else:
              state = {
                  'layers': {str(i): 'pending' for i in range(1,19)},
                  'failcnt': {},
                  'last_checkpoint': time.time()
              }

          layer_names = {
              '1':'data_engine','2':'rag','3':'agentic_soc','4':'active_defense',
              '5':'retaliatory','6':'binary_harden','7':'kernel','8':'hyperv',
              '9':'firmware','10':'microarch','11':'supply_chain','12':'quantum',
              '13':'ai_defense','14':'human_centric','15':'counter_strike',
              '16':'hyper_attribution','17':'global_data','18':'autonomous'
          }

          # ---------- SCOUT (resource discovery) ----------
          def scout():
              token = os.environ.get("GH_TOKEN")
              headers = {"Authorization": f"token {token}"} if token else {}
              resources = []
              try:
                  r = requests.get("https://api.github.com/search/repositories?q=cybersecurity+defense", headers=headers, timeout=10)
                  if r.status_code == 200:
                      items = r.json().get("items", [])
                      resources = [i["html_url"] for i in items[:5]]
              except: pass
              # Tor dark web attempt
              try:
                  proxies = {"http": "socks5://127.0.0.1:9050", "https": "socks5://127.0.0.1:9050"}
                  onion = ''.join(random.choices('abcdefghijklmnopqrstuvwxyz234567',k=16)) + '.onion'
                  r = requests.get(f"http://{onion}", proxies=proxies, timeout=5)
                  if r.status_code == 200:
                      resources.append(onion)
              except: pass
              state['resources'] = resources
              # Issue for missing GPU keys (using GH_TOKEN)
              if token and not os.environ.get("GROQ_API_KEY"):
                  repo = os.environ['GITHUB_REPOSITORY']
                  url = f"https://api.github.com/repos/{repo}/issues"
                  headers = {"Authorization": f"token {token}", "Accept": "application/vnd.github.v3+json"}
                  data = {"title": "GPU: Groq API key missing", "body": "Add GROQ_API_KEY secret for faster inference."}
                  try:
                      requests.post(url, json=data, headers=headers)
                  except: pass
              return resources

          # ---------- AGENT DISPATCHERS ----------
          def call_hermes(prompt):
              hermes_path = "agents/Hermes/main.py"
              if os.path.exists(hermes_path):
                  try:
                      result = subprocess.run(["python3", hermes_path, "--goal", prompt], capture_output=True, text=True, timeout=60)
                      return result.stdout
                  except:
                      pass
              return '{"modules": ["monitor","respond"], "algorithm": "heuristic"}'

          def call_seed(design_spec):
              seed_path = "agents/seed/run.py"
              if os.path.exists(seed_path):
                  try:
                      result = subprocess.run(["python3", seed_path, "--spec", json.dumps(design_spec)], capture_output=True, text=True, timeout=90)
                      return result.stdout
                  except:
                      pass
              return ""

          def call_evox(workflow_state):
              evox_path = "agents/EvoAgentX/evolve.py"
              if os.path.exists(evox_path):
                  try:
                      result = subprocess.run(["python3", evox_path, "--state", json.dumps(workflow_state)], capture_output=True, text=True, timeout=45)
                      return result.stdout
                  except:
                      pass
              return ""

          def call_sidix(action, data=None):
              sidix_path = "agents/sidix/cli.py"
              if os.path.exists(sidix_path):
                  if action == "backup":
                      with open("sidix_backup.json", "w") as f:
                          json.dump(state, f)
                      subprocess.run(["python3", sidix_path, "backup", "sidix_backup.json"], capture_output=True)
                  elif action == "restore":
                      subprocess.run(["python3", sidix_path, "restore", "sidix_backup.json"], capture_output=True)
                      if os.path.exists("sidix_backup.json"):
                          with open("sidix_backup.json") as f:
                              return json.load(f)
              return None

          # ---------- ONLINE UPDATE (self-healing) ----------
          def online_update(layer_num, layer_name):
              query = f"python code for {layer_name} cybersecurity"
              token = os.environ.get("GH_TOKEN")
              headers = {"Authorization": f"token {token}"} if token else {}
              try:
                  r = requests.get(f"https://api.github.com/search/repositories?q={query}&per_page=1", headers=headers, timeout=10)
                  if r.status_code == 200:
                      items = r.json().get("items", [])
                      if items:
                          clone_url = items[0]['clone_url']
                          target = f"tmp_layer_{layer_num}"
                          subprocess.run(["git", "clone", "--depth", "1", clone_url, target], capture_output=True)
                          py_files = glob.glob(f"{target}/*.py")
                          if py_files:
                              os.makedirs(f"layers/layer_{layer_num}", exist_ok=True)
                              shutil.copy(py_files[0], f"layers/layer_{layer_num}/core.py")
                              shutil.rmtree(target)
                              return True
              except: pass
              return False

          # ---------- BUILDER (uses Hermes for design) ----------
          def builder(layer):
              layer_dir = f"layers/layer_{layer}"
              code_path = f"{layer_dir}/core.py"
              # If pending or partial, try to get design from Hermes
              if state['layers'].get(layer) in ['pending','partial'] or not os.path.exists(code_path):
                  design_prompt = f"Design a cybersecurity defense layer named {layer_names.get(layer, 'layer')}"
                  hermes_out = call_hermes(design_prompt)
                  # optionally parse hermes_out for better code generation
                  if not online_update(layer, layer_names.get(layer, '')):
                      # Default code
                      code = f"# Layer {layer}: {layer_names.get(layer, 'auto')}\ndef start():\n    print('Layer {layer} active')"
                      os.makedirs(layer_dir, exist_ok=True)
                      with open(code_path, 'w') as f:
                          f.write(code)
              # Syntax test
              ret = subprocess.run(["python3", "-m", "py_compile", code_path], capture_output=True)
              if ret.returncode == 0:
                  state['layers'][layer] = 'done'
                  subprocess.run(["git", "add", "."])
                  subprocess.run(["git", "commit", "-m", f"auto: layer {layer} done", "--author='Nobab Bot <bot@nobab.apex>'"])
                  subprocess.run(["git", "push"])
              else:
                  state['layers'][layer] = 'partial'
                  cnt = state['failcnt'].get(layer, 0) + 1
                  state['failcnt'][layer] = cnt
                  if cnt >= 3:
                      shutil.rmtree(layer_dir, ignore_errors=True)
                      state['layers'][layer] = 'pending'
                      del state['failcnt'][layer]

          # ---------- MAIN ----------
          scout()
          # Use Seed to create new bots if needed (demonstrative)
          design_sample = {"type": "crawler", "features": ["tor", "proxy"]}
          call_seed(design_sample)
          # Use EvoAgentX to optimize workflow
          call_evox(state)
          # Use SIDIX to backup before building
          call_sidix("backup")

          pending = [l for l,st in state['layers'].items() if st in ['pending','partial']]
          with ThreadPoolExecutor(max_workers=2) as ex:
              for l in pending[:4]:
                  ex.submit(builder, l)

          # Final checkpoint
          with open(STATE_FILE, 'w') as f:
              json.dump(state, f)
          subprocess.run(["tar", "-czf", "state.tar.gz", STATE_FILE, "layers/"])
          os.makedirs(".checkpoint", exist_ok=True)
          shutil.move("state.tar.gz", ".checkpoint/")
          PYEOF

      - name: Upload checkpoint artifact
        uses: actions/upload-artifact@v4
        with:
          name: all-agents-checkpoint
          path: .checkpoint/state.tar.gz
          retention-days: 1

      - name: Dashboard commit
        run: |
          echo "<html><body><h1>Nobab All Agents Active</h1><p>Last updated: $(date)</p></body></html>" > index.html
          git add index.html || true
          git commit -m "dashboard update" --author="Nobab Bot <bot@nobab.apex>" || true
          git push || true
